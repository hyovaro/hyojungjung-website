    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f7f4ef; color: #1a1a1a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
        a { color: inherit; text-decoration: none; }
        [lang="ko"] { font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', 'Malgun Gothic', serif; word-break: keep-all; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 52px; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; background: #f7f4ef; z-index: 100; }
        .nav-brand { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 15px; letter-spacing: 0.04em; color: #5e5e5e; transition: color 0.2s; }
        .nav-brand-ko { font-family: 'Noto Serif KR', serif; font-size: 12px; font-weight: 300; margin-left: 4px; }
        .nav-brand:hover { color: #7c3a36; }
        .nav-back { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5e5e5e; transition: color 0.2s; }
        .nav-back:hover { color: #7c3a36; }

        /* Hero */
        .hero { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 0.5px solid rgba(0,0,0,0.1); min-height: 480px; }
        .hero-photo { overflow: hidden; border-right: 0.5px solid rgba(0,0,0,0.1); }
        .hero-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hero-info { padding: 56px 52px; display: flex; flex-direction: column; justify-content: center; }
        .badge { align-self: flex-start; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #7c3a36; border: 0.5px solid #7c3a36; border-radius: 3px; padding: 4px 12px; margin-bottom: 22px; }
        .eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #6f6f6f; line-height: 2; margin-bottom: 18px; }
        .hero-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 52px; font-weight: 300; line-height: 1.03; letter-spacing: -0.01em; margin-bottom: 6px; }
        .hero-title em { font-style: italic; }
        .hero-title-ko { display: block; font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 300; color: #6f6f6f; margin-top: 14px; letter-spacing: 0.05em; }
        .hero-meta { font-size: 14px; line-height: 1.9; color: #5e5e5e; margin-top: 26px; max-width: 440px; }
        .hero-meta strong { color: #1a1a1a; font-weight: 500; }

        .section-label { padding: 16px 52px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .section-label span { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #6f6f6f; }

        /* Photo grid */
        .perf-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 300px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .perf-cell { overflow: hidden; border-right: 0.5px solid rgba(0,0,0,0.1); border-bottom: 0.5px solid rgba(0,0,0,0.1); display: block; }
        .perf-cell:nth-child(3n) { border-right: none; }
        .perf-cell.wide { grid-column: span 2; }
        .perf-cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
        .perf-cell:hover img { transform: scale(1.03); }
        .perf-cell.poster { background: #0c1c34; }
        .perf-cell.poster img { object-fit: contain; }

        .page-footer { padding: 40px 52px; display: flex; justify-content: space-between; align-items: center; }
        .footer-link { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5e5e5e; border-bottom: 0.5px solid #b8b2a8; padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
        .footer-link:hover { color: #7c3a36; border-color: #7c3a36; }
        .footer-note { font-size: 11px; color: #6f6f6f; font-style: italic; font-family: 'Cormorant Garamond', Georgia, serif; }

        @media (max-width: 760px) {
            nav, .hero-info, .section-label, .page-footer { padding-left: 28px; padding-right: 28px; }
            .hero { grid-template-columns: 1fr; }
            .hero-photo { aspect-ratio: 4 / 3; border-right: none; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
            .hero-title { font-size: 40px; }
            .perf-grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 200px; }
            .perf-cell:nth-child(3n) { border-right: 0.5px solid rgba(0,0,0,0.1); }
            .perf-cell.wide { grid-column: span 2; }
        }
            .press-link { display: inline-flex; margin-top: 16px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #7c3a36; border-bottom: 0.5px solid #7c3a36; padding-bottom: 2px; }
        .press-link:hover { opacity: 0.7; }

        /* ── CSS lightbox (no JS) ── */
        .lb { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; background: rgba(20,18,16,0.95); }
        .lb:target { display: flex; }
        .lb-back { position: absolute; inset: 0; cursor: zoom-out; }
        .lb-pic { position: relative; z-index: 2; max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 2px; }
        .lb-close { position: absolute; top: 16px; right: 26px; z-index: 3; font-size: 30px; color: #fff; line-height: 1; }
        .lb-prev, .lb-next { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; font-size: 46px; color: #fff; padding: 0 22px; opacity: 0.8; user-select: none; }
        .lb-prev { left: 4px; } .lb-next { right: 4px; }
        .lb-close:hover, .lb-prev:hover, .lb-next:hover { opacity: 1; color: #fff; }
        /* ── Floating event nav ── */
        .float-nav { position: fixed; bottom: 28px; right: 28px; display: flex; gap: 2px; z-index: 200; }
        .float-nav a { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 9px 16px; border: 0.5px solid #7c3a36; color: #7c3a36; background: #f7f4ef; transition: background 0.2s, color 0.2s; text-decoration: none; white-space: nowrap; }
        .float-nav a:hover { background: #7c3a36; color: #f7f4ef; }
        @media (max-width: 760px) { .float-nav { bottom: 18px; right: 14px; gap: 6px; } .float-nav a { padding: 9px 12px; font-size: 9px; } }

/* fn-mobile-fix */@media (max-width:768px){.float-nav{left:0;right:0;bottom:0;gap:6px;justify-content:center;flex-wrap:wrap;padding:8px 10px;background:rgba(247,244,239,0.96);border-top:.5px solid #d5d0c8}.float-nav a{padding:8px 11px;font-size:10px}body{padding-bottom:60px}}

        /* bb3-unify nav+footer */
        .nav-links { display: flex; gap: 28px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #5e5e5e; align-items: center; }
        .nav-links a { color: #5e5e5e; transition: color 0.2s; }
        .nav-links a:hover { color: #7c3a36; }
        .nav-links a.active { color: #1a1a1a; }
        footer { padding: 40px 52px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .footer-left { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #6f6f6f; }
        .footer-right { display: flex; gap: 24px; }
        .footer-link { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #6f6f6f; transition: color 0.2s; }
        .footer-link:hover { color: #1a1a1a; }
        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            .nav-links { gap: 12px 14px; flex-wrap: wrap; justify-content: flex-end; font-size: 10px; }

    /* bd1-grade: subtle warm tone on photographs (reversible — delete this block to revert) */
.photo-item:not(.poster-plain):not(.poster) img,
.perf-cell:not(.poster) img,
.lb-pic,
.hero-photo img,

    /* bd3-a11y : affordances + contrast + touch (reversible — delete this block to revert) */
    /* Persistent underline affordance on in-text/content links (RED_TEAM U-02) */
    .article-link,.about-link,.contact-email,.contact-link,.tz-press,.social-link,.link{text-decoration:underline;text-decoration-thickness:.5px;text-underline-offset:3px;text-decoration-color:rgba(26,26,26,.3);}
    /* Keyboard focus visibility on every interactive element */
    a:focus-visible,button:focus-visible,summary:focus-visible,[tabindex]:focus-visible{outline:2px solid #7c3a36;outline-offset:2px;border-radius:1px;}
    /* Hover deepen — gated so touch devices don't stick (RED_TEAM M3) */
    @media (hover:hover){.article-link:hover,.about-link:hover,.contact-email:hover,.contact-link:hover,.tz-press:hover,.social-link:hover,.link:hover{color:#7c3a36;text-decoration-color:#7c3a36;}}
    /* Production tiles: the "View production" cue is hover-only -> invisible on touch, so show it persistently there (RED_TEAM U-03) */
    @media (hover:none){.production-img-overlay{opacity:1;background:rgba(26,26,26,.32);}}
    /* Press/active feedback for touch */
    .float-nav a:active,.lb-back:active,.lb-prev:active,.lb-next:active,.lb-close:active,.pdf-link:active,.press-link:active,.nav-links a:active,.footer-link:active{opacity:.7;}
    /* >=44px tap targets on lightbox controls (all viewports) */
    .lb-close,.lb-prev,.lb-next{min-width:44px;min-height:44px;box-sizing:border-box;}
    .lb-close{display:flex;align-items:center;justify-content:center;}
    /* >=44px tap targets on standalone controls, mobile (RED_TEAM M1, M2) */
    @media (max-width:768px){
      .nav-links a,.footer-link{min-height:44px;display:inline-flex;align-items:center;}
      .float-nav a{min-height:44px;display:inline-flex;align-items:center;justify-content:center;}
      .pdf-link,.press-link,.btn-video,.social-link,.hero-nav-link{min-height:44px;display:inline-flex;align-items:center;}
      summary{min-height:44px;}
    }
/* be2-typescale */
:root{
  --fs-eyebrow:10px;--fs-caption:12px;--fs-meta:13px;--fs-body:15px;
  --fs-lead:17px;--fs-lg:19px;--fs-h4:24px;--fs-h3:30px;--fs-h2:40px;

}
/* KO/EN optical harmony — zero-specificity fallback, never overrides hand-tuned sizes */
:where(span,em,a,strong)[lang="ko"]{font-size:var(--ko-optical);}
:where(p,li,dd,blockquote,figcaption)[lang="ko"]{line-height:var(--lh-ko);}
:where([lang="ko"]){word-break:keep-all;}
/* /be2-typescale */
